name: RepoBrief Check
description: >-
  Detect drift in generated brief files (AGENTS.md, docs/agent/*.md).
  Fails the job if any committed brief file differs from freshly generated content.

inputs:
  package-version:
    description: "npm version or tag of @rogerdigital/repo-brief to use. Ignored when use-source is true."
    required: false
    default: "latest"
  use-source:
    description: "When 'true', build repo-brief from the checked-out source (for this repo's own CI) instead of pulling the published npm package."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build repo-brief from source
      if: inputs.use-source == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # Zero runtime deps; only need typescript to compile.
        npm install --ignore-scripts --no-package-lock --no-save typescript@5.8.3 @types/node@22.15.29
        npm run build

    - name: Generate fresh brief into temp dir
      shell: bash
      run: |
        # repo-brief's --cwd controls BOTH the scan root and the output root.
        # We need to scan the checked-out workspace but write generated files
        # to a temp location (so we don't clobber committed files before
        # diffing). Copy the workspace to a temp dir — excluding the brief
        # OUTPUTS we're about to regenerate (docs/agent/*) plus .git and
        # node_modules, but KEEPING AGENTS.md since the scanner reports its
        # presence/absence as a readiness note.
        src="$GITHUB_WORKSPACE"
        gen="$RUNNER_TEMP/gen"
        mkdir -p "$gen"
        rsync -a \
          --exclude='/docs/agent/' \
          --exclude='/.git/' \
          --exclude='/node_modules/' \
          --exclude='/dist/' \
          "$src/" "$gen/"

        if [[ "${{ inputs.use-source }}" == "true" ]]; then
          node "$GITHUB_WORKSPACE/dist/src/cli.js" brief --cwd "$gen"
        else
          npx -y @rogerdigital/repo-brief@${{ inputs.package-version }} brief --cwd "$gen"
        fi

    - name: Detect drift against committed files
      shell: bash
      run: |
        set -euo pipefail
        gen="$RUNNER_TEMP/gen"
        drift_files=()
        brief_paths=("AGENTS.md" "docs/agent/repo-map.md" "docs/agent/commands.md" "docs/agent/risk-zones.md")

        for rel in "${brief_paths[@]}"; do
          committed="$GITHUB_WORKSPACE/$rel"
          generated="$gen/$rel"
          if [[ ! -f "$committed" || ! -f "$generated" ]]; then
            drift_files+=("$rel")
            echo "::group::Drift in $rel"
            if [[ ! -f "$committed" ]]; then
              echo "Committed file is missing: $rel"
            fi
            if [[ ! -f "$generated" ]]; then
              echo "Generated file is missing: $rel"
            fi
            echo "::endgroup::"
            continue
          fi
          if ! git diff --no-index --quiet "$committed" "$generated"; then
            drift_files+=("$rel")
            echo "::group::Drift in $rel"
            git diff --no-index "$committed" "$generated" || true
            echo "::endgroup::"
          fi
        done

        if (( ${#drift_files[@]} > 0 )); then
          echo "::error::Brief files are out of date. Run \`repo-brief brief\` locally and commit the changes."
          printf '  - %s\n' "${drift_files[@]}"
          exit 1
        fi

        echo "All committed brief files are up to date."
