name: Brief Check

on:
  pull_request:
    paths:
      - '**'
      - '!.github/workflows/brief-check.yml'

permissions:
  contents: read

concurrency:
  group: brief-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Brief drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RepoBrief drift check
        # This repo's own CI builds from source so PRs validate against the
        # exact code being merged (the published npm package lags between
        # releases). External consumers omit use-source and pull via npx.
        uses: ./.github/actions/repo-brief-check
        with:
          use-source: "true"
